name: Release · Versioning

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate squash-merge title for Release Please
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          first_line=$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | head -n 1)
          pattern='^(feat|fix|chore|docs|test|refactor)(\([a-z][a-z0-9-]*\))?(!)?: [a-z0-9].*( \(#[0-9]+\))?$'

          if [[ ! "$first_line" =~ $pattern ]]; then
            echo "::error title=Release Please needs a Conventional Commit title::Pushes to main are squash-merged, and Release Please parses the resulting main commit title. Got: $first_line"
            echo "Use a PR title or merge title like: fix(infra): guard release merge titles"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        if: vars.RELEASE_APP_ID != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge for Release Please PR
        if: steps.release.outputs.prs_created == 'true' && vars.RELEASE_APP_ID != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr merge "${{ fromJson(steps.release.outputs.pr).number }}" --auto --squash
