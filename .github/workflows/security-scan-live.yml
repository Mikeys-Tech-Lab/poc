name: Security · Live Site Scan

on:
  workflow_run:
    workflows: ["Deploy · Seed", "Deploy · Preview"]
    types: [completed]
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (e.g. https://seed.practiceofclarity.eu)"
        required: true
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Nuclei Security Scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.target_url }}" >> "$GITHUB_OUTPUT"
            echo "Target: ${{ inputs.target_url }} (manual dispatch)"
          elif [ "${{ github.event.workflow_run.name }}" = "Deploy · Seed" ]; then
            echo "url=${{ vars.DEVELOPMENT_SITE_URL }}" >> "$GITHUB_OUTPUT"
            echo "Target: ${{ vars.DEVELOPMENT_SITE_URL }} (post-deploy seed)"
          elif [ "${{ github.event.workflow_run.name }}" = "Deploy · Preview" ]; then
            echo "url=${{ vars.PREVIEW_SITE_URL }}" >> "$GITHUB_OUTPUT"
            echo "Target: ${{ vars.PREVIEW_SITE_URL }} (post-deploy preview)"
          else
            echo "::error::Could not resolve target URL from workflow run: ${{ github.event.workflow_run.name }}"
            exit 1
          fi

      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: >-
            -u ${{ steps.target.outputs.url }}
            -t http/misconfiguration/http-missing-security-headers.yaml
            -sarif-export nuclei.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: nuclei.sarif
          category: nuclei-live-scan
