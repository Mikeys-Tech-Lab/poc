name: Security · HTTP Headers (Nuclei)

on:
  workflow_run:
    workflows: ["Deploy · Seed", "Deploy · Preview"]
    types: [completed]
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (e.g. https://seed.practiceofclarity.eu)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  scan-seed:
    name: Headers · Seed
    runs-on: ubuntu-latest
    environment: development
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Deploy · Seed' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: >-
            -u ${{ vars.DEVELOPMENT_SITE_URL }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload requires GitHub Advanced Security (free for public repos).
      # Re-enable when the repository goes public. See #38.

  scan-preview:
    name: Headers · Preview
    runs-on: ubuntu-latest
    environment: preview
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Deploy · Preview' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: >-
            -u ${{ vars.PREVIEW_SITE_URL }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload requires GitHub Advanced Security (free for public repos).
      # Re-enable when the repository goes public. See #38.

  scan-manual:
    name: Headers · Manual
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: >-
            -u ${{ inputs.target_url }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload requires GitHub Advanced Security (free for public repos).
      # Re-enable when the repository goes public. See #38.
