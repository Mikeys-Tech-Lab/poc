name: Security · HTTP Headers (Nuclei)

on:
  workflow_run:
    workflows: ["Deploy · Seed", "Deploy · Preview", "Deploy · Production"]
    types: [completed]
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (e.g. https://seed.practiceofclarity.eu)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  scan-seed:
    name: Headers · Seed
    runs-on: ubuntu-latest
    environment: development
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Deploy · Seed' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538 # v3.1.1
        with:
          args: >-
            -u ${{ vars.DEVELOPMENT_SITE_URL }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload is currently disabled in this repo setup.
      # Re-enable if GitHub Advanced Security is available and wanted here.

  scan-preview:
    name: Headers · Preview
    runs-on: ubuntu-latest
    environment: preview
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Deploy · Preview' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538 # v3.1.1
        with:
          args: >-
            -u ${{ vars.PREVIEW_SITE_URL }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload is currently disabled in this repo setup.
      # Re-enable if GitHub Advanced Security is available and wanted here.

  scan-production:
    name: Headers · Production
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Deploy · Production' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538 # v3.1.1
        with:
          args: >-
            -u ${{ vars.PUBLIC_SITE_URL }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload is currently disabled in this repo setup.
      # Re-enable if GitHub Advanced Security is available and wanted here.

  scan-manual:
    name: Headers · Manual
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Run Nuclei scan
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538 # v3.1.1
        with:
          args: >-
            -u ${{ inputs.target_url }}
            -t http/misconfiguration/http-missing-security-headers.yaml

      # SARIF upload is currently disabled in this repo setup.
      # Re-enable if GitHub Advanced Security is available and wanted here.
