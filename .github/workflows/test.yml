name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, Unit, Build, Type Check, E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Collect changed files
        run: |
          mkdir -p .tmp
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .tmp/guidance-changed-files.txt
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              git diff-tree --no-commit-id --name-only -r HEAD > .tmp/guidance-changed-files.txt
            else
              git diff --name-only "$BEFORE...HEAD" > .tmp/guidance-changed-files.txt
            fi
          fi

      - name: Guidance drift guard
        run: pnpm guidance:check -- --changed-files .tmp/guidance-changed-files.txt

      - name: License surface check
        run: pnpm license:check

      - name: Unit tests
        run: pnpm -r test

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm --filter site check

      - name: Install Playwright browsers
        run: pnpm --filter site exec playwright install --with-deps chromium

      - name: E2E tests
        env:
          POC_PRIVATE_LEAK_PATTERNS: ${{ secrets.POC_PRIVATE_LEAK_PATTERNS }}
        run: pnpm --filter site test:e2e
