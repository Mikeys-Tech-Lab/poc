name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, Unit, Build, Type Check, E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Collect changed files
        run: |
          mkdir -p .tmp
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .tmp/guidance-changed-files.txt
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              git diff-tree --no-commit-id --name-only -r HEAD > .tmp/guidance-changed-files.txt
            else
              git diff --name-only "$BEFORE...HEAD" > .tmp/guidance-changed-files.txt
            fi
          fi

      - name: Guidance drift guard
        run: pnpm guidance:check -- --changed-files .tmp/guidance-changed-files.txt

      - name: Unit tests
        run: pnpm -r test

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm --filter site check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm --filter site test:e2e
