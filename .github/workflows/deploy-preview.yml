name: Deploy · Preview

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-preview
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build
        env:
          SITE_URL: ${{ vars.PREVIEW_SITE_URL }}

      - name: Generate .htaccess to block direct-to-origin
        run: |
          {
            echo "RewriteEngine On"
            echo ""
            echo "# Block direct-to-origin requests (no CF-Connecting-IP = not through Cloudflare)"
            echo "# All legitimate traffic goes through Cloudflare, where Access handles authentication"
            echo "RewriteCond %{HTTP:CF-Connecting-IP} ^$"
            echo "RewriteRule ^ - [F,L]"
          } > apps/site/dist/.htaccess
          echo "Generated .htaccess: direct-to-origin block (Cloudflare Access handles auth)"

      - name: Append security headers to .htaccess
        run: |
          cat >> apps/site/dist/.htaccess << 'HEADERS'

          # HTTP security headers
          <IfModule mod_headers.c>
            Header always set X-Content-Type-Options "nosniff"
            Header always set X-Frame-Options "DENY"
            Header always set Referrer-Policy "strict-origin-when-cross-origin"
            Header always set Permissions-Policy "geolocation=(), camera=(), microphone=(), usb=(), payment=(), interest-cohort=()"
            Header always set X-Permitted-Cross-Domain-Policies "none"
            Header always set Cross-Origin-Opener-Policy "same-origin"
            Header always set Cross-Origin-Resource-Policy "same-origin"
            Header always set Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
          </IfModule>
          HEADERS
          echo "Appended security headers to .htaccess"

      - name: Append locale redirect to .htaccess
        run: |
          cat >> apps/site/dist/.htaccess << 'REDIRECT'

          # Default locale redirect (no root locale — all locales use /xx-xx/ prefix)
          RewriteRule ^$ /en-us/ [R=301,L]
          REDIRECT
          echo "Appended locale redirect to .htaccess"

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PREVIEW_SSH_HOST }}
          SSH_USER: ${{ secrets.PREVIEW_SSH_USER }}
          SSH_PORT: ${{ secrets.PREVIEW_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.PREVIEW_DEPLOY_PATH }}
        run: |
          set +x
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT:-22}" \
            apps/site/dist/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}"
          echo "Deployment complete."

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
