name: Security · Dependency Audit (Shai-Hulud)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shai-hulud:
    name: Shai-Hulud 2.0 Detector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan for compromised packages
        uses: gensecaihq/Shai-Hulud-2.0-Detector@v2
        with:
          fail-on-critical: true
          fail-on-high: true
          scan-lockfiles: true
          scan-node-modules: false
          output-format: text
