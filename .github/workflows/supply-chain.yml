name: Security · Dependency Audit (Shai-Hulud)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shai-hulud:
    name: Shai-Hulud 2.0 Detector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Scan for compromised packages
        uses: gensecaihq/Shai-Hulud-2.0-Detector@85d0ad15eed5c2274e5606949735b59751a0bc61 # v2
        with:
          fail-on-critical: true
          fail-on-high: true
          scan-lockfiles: true
          scan-node-modules: false
          output-format: text
