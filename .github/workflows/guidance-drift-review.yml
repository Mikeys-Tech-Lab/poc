name: Guidance Drift Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: guidance-drift-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  models: read
  pull-requests: write

jobs:
  guidance-drift-review:
    name: Guidance Drift Review (advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Gather PR context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          git fetch origin "$BASE_REF" --depth=1
          git diff --name-only "origin/$BASE_REF...HEAD" > .tmp/guidance-drift-changed-files.txt
          git diff --unified=1 "origin/$BASE_REF...HEAD" -- README.md AGENTS.md docs/onboarding docs/guidance .cursor/skills .github/copilot-instructions.md .github/pull_request_template.md .claude/CLAUDE.md docs/architecture/workspace.md > .tmp/guidance-drift-diff.patch || true
          gh pr view "$PR_NUMBER" --json title,body,url > .tmp/guidance-drift-pr.json

          python <<'PY' > .tmp/guidance-drift-sections.md
          from pathlib import Path


          def extract_section(path: str, heading: str) -> str:
              file_path = Path(path)
              if not file_path.exists():
                  return f"[Missing file: {path}]"

              lines = file_path.read_text().splitlines()
              start = None
              level = None

              for index, line in enumerate(lines):
                  if line.strip() == heading:
                      start = index
                      level = line.count('#')
                      break

              if start is None or level is None:
                  return f"[Missing section: {heading}]"

              end = len(lines)
              marker = '#' * level + ' '
              for index in range(start + 1, len(lines)):
                  line = lines[index]
                  if line.startswith(marker) and line.strip() != heading:
                      end = index
                      break

              return '\n'.join(lines[start:end]).strip()


          sections = [
              ("AGENTS.md", "## Reflection and evolution discipline"),
              ("AGENTS.md", "## Documentation evolution discipline"),
              ("AGENTS.md", "### Durable learning"),
              ("AGENTS.md", "### Guidance drift guard"),
              ("docs/guidance/evolution-arc.md", "## What each surface contributes"),
              ("docs/guidance/trace-climb.md", "## Trigger model"),
              ("docs/guidance/trace-climb.md", "## Propagation decision"),
              ("docs/onboarding/ai-guidance.md", "## Cursor: rules and skills"),
              (".github/pull_request_template.md", "## Learning trace"),
          ]

          for path, heading in sections:
              print(f"## {path} :: {heading}")
              print(extract_section(path, heading))
              print()
          PY

          {
            echo "# Pull Request"
            cat .tmp/guidance-drift-pr.json
            echo
            echo "# Changed Files"
            cat .tmp/guidance-drift-changed-files.txt
            echo
            echo "# Repo Contract Excerpts"
            cat .tmp/guidance-drift-sections.md
            echo "# Diff Excerpt"
            head -c 20000 .tmp/guidance-drift-diff.patch
            echo
          } > .tmp/guidance-drift-review-input.md

      - name: Run advisory AI review
        id: advisory-review
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh extension install https://github.com/github/gh-models
          gh models run --file .github/prompts/guidance-drift-review.prompt.yml < .tmp/guidance-drift-review-input.md > .tmp/guidance-drift-review-output.md

      - name: Post advisory comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          REVIEW_FAILED: ${{ steps.advisory-review.outcome != 'success' }}
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- guidance-drift-review -->';
            const outputPath = '.tmp/guidance-drift-review-output.md';

            let body;
            if (process.env.REVIEW_FAILED === 'true' || !fs.existsSync(outputPath)) {
              body = `${marker}
            ## Guidance Drift Review
            - Advisory review was unavailable for this run.
            - The blocking deterministic validator remains the merge gate for factual contract checks.`;
            } else {
              const output = fs.readFileSync(outputPath, 'utf8').trim();
              body = `${marker}
            ## Guidance Drift Review
            _Non-blocking advisory review generated from inspectable repo traces._

            ${output}`;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Upload advisory artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: guidance-drift-review
          path: |
            .tmp/guidance-drift-review-input.md
            .tmp/guidance-drift-review-output.md
