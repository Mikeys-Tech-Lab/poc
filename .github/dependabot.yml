# Dependabot is retained only for GitHub-native security updates.
# Routine version updates are managed by Renovate via `renovate.json`.
# Docs: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2

updates:
  # npm security updates only
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/site"
      - "/tools/ai-guidance"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
    groups:
      astro-ecosystem-security:
        applies-to: security-updates
        patterns:
          - "astro*"
          - "@astrojs/*"
          - "@catppuccin/*"
      runtime-security:
        applies-to: security-updates
        dependency-type: "production"
      development-security:
        applies-to: security-updates
        dependency-type: "development"
    open-pull-requests-limit: 0

  # GitHub Actions security updates only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
      - "security"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 0
