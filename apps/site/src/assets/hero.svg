<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280" fill="none">
  <!-- Outer circle: containment -->
  <circle cx="140" cy="140" r="120" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Inner prism shape: clarity through structure -->
  <polygon points="140,50 220,190 60,190" stroke="currentColor" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Refracted lines: trace made visible -->
  <line x1="140" y1="50" x2="100" y2="230" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="50" x2="140" y2="230" stroke="currentColor" stroke-width="1" opacity="0.25"/>
  <line x1="140" y1="50" x2="180" y2="230" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  
  <!-- Center dot: point of focus -->
  <circle cx="140" cy="145" r="4" fill="currentColor" opacity="0.5"/>
</svg>
